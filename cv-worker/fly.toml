app = "rockie-cv-worker"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  TMP_DIR = "/tmp/rockie"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  size = "performance-2x"
  memory = "4gb"

[mounts]
  source = "rockie_tmp"
  destination = "/tmp/rockie"
